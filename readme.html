<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bid Data Validator - User Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown.min.css">
    <link rel="stylesheet" href="readme.css">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a href="index.html">Back to Validator</a>
            <div class="topbar-controls">
                <button id="themeToggle" class="theme-toggle" type="button">Theme: 🖥️ System</button>
                <span class="status" id="status">Loading User Guide...</span>
            </div>
        </div>
    </header>

    <main class="content-wrap">
        <article id="content" class="markdown-body"></article>
    </main>

    <script src="theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        async function loadReadme() {
            const status = document.getElementById('status');
            const content = document.getElementById('content');

            try {
                const response = await fetch('README.md', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }

                const markdown = await response.text();
                content.innerHTML = marked.parse(markdown);
                status.textContent = 'User Guide loaded';
            } catch (error) {
                content.innerHTML = '<h1>User Guide unavailable</h1><p>Could not load README.md. If you opened this file directly from disk, run a local server first (for example: <code>python3 -m http.server 8000</code>).</p>';
                status.textContent = 'Failed to load User Guide';
            }
        }

        const themeToggle = document.getElementById('themeToggle');
        if (window.ThemeController && themeToggle) {
            window.ThemeController.init(themeToggle);
        }

        loadReadme();
    </script>
</body>
</html>
