<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bid Data Validator - User Guide</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown.min.css">
    <style>
        :root {
            color-scheme: light dark;
        }

        [data-theme="light"] {
            --page-bg: #f9f9f9;
            --page-text: #000000;
            --card-bg: #ffffff;
            --border: #cccccc;
            --topbar-bg: #f0f0f0;
            --status-text: #333333;
            --link-color: #0052cc;
            --link-hover: #003d99;
        }

        [data-theme="dark"] {
            --page-bg: #0d1117;
            --page-text: #e6edf3;
            --card-bg: #0d1117;
            --border: #30363d;
            --topbar-bg: #161b22;
            --status-text: #8b949e;
            --link-color: #58a6ff;
            --link-hover: #79c0ff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                color-scheme: dark;
            }
            html:not([data-theme]) {
                --page-bg: #0d1117;
                --page-text: #e6edf3;
                --card-bg: #0d1117;
                --border: #30363d;
                --topbar-bg: #161b22;
                --status-text: #8b949e;
                --link-color: #58a6ff;
                --link-hover: #79c0ff;
            }
        }

        @media (prefers-color-scheme: light) {
            :root {
                color-scheme: light;
            }
            html:not([data-theme]) {
                --page-bg: #f9f9f9;
                --page-text: #000000;
                --card-bg: #ffffff;
                --border: #cccccc;
                --topbar-bg: #f0f0f0;
                --status-text: #333333;
                --link-color: #0052cc;
                --link-hover: #003d99;
            }
        }

        body {
            margin: 0;
            background: var(--page-bg);
            color: var(--page-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 2;
            padding: 14px 16px;
            background: var(--topbar-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .topbar a {
            color: var(--link-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .topbar a:hover {
            color: var(--link-hover);
            text-decoration: underline;
        }

        .topbar a:focus-visible {
            outline: 2px solid var(--link-color);
            outline-offset: 2px;
            border-radius: 2px;
        }

        .theme-toggle {
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--page-bg);
            color: var(--page-text);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .theme-toggle:hover {
            border-color: var(--link-color);
            background: var(--topbar-bg);
        }

        .theme-toggle:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.25);
            border-color: var(--link-color);
        }

        .markdown-body {
            box-sizing: border-box;
            max-width: 980px;
            margin: 24px auto;
            padding: 32px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .status {
            font-size: 0.9rem;
            color: var(--status-text);
            white-space: nowrap;
        }

        /* Light mode text overrides for maximum readability */
        [data-theme="light"] .markdown-body {
            color: #000000;
            background: #ffffff;
        }

        [data-theme="light"] .markdown-body h1,
        [data-theme="light"] .markdown-body h2,
        [data-theme="light"] .markdown-body h3,
        [data-theme="light"] .markdown-body h4,
        [data-theme="light"] .markdown-body h5,
        [data-theme="light"] .markdown-body h6 {
            color: #000000;
            border-color: #cccccc;
        }

        [data-theme="light"] .markdown-body strong {
            color: #000000;
        }

        [data-theme="light"] .markdown-body code {
            background: #f5f5f5;
            color: #000000;
            border: 1px solid #e0e0e0;
            padding: 2px 6px;
            border-radius: 3px;
        }

        [data-theme="light"] .markdown-body pre {
            background: #f5f5f5;
            border: 1px solid #ddd;
            color: #000000;
        }

        [data-theme="light"] .markdown-body table {
            border-color: #cccccc;
        }

        [data-theme="light"] .markdown-body table tr {
            border-color: #cccccc;
        }

        [data-theme="light"] .markdown-body table th,
        [data-theme="light"] .markdown-body table td {
            border: 1px solid #cccccc;
            color: #000000;
        }

        [data-theme="light"] .markdown-body table tr:nth-child(2n) {
            background: #f9f9f9;
        }

        [data-theme="light"] .markdown-body blockquote {
            border-left: 4px solid #cccccc;
            color: #333333;
        }

        [data-theme="light"] .markdown-body a {
            color: #0052cc;
        }

        [data-theme="light"] .markdown-body a:hover {
            color: #003d99;
        }

        @media (max-width: 767px) {
            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .markdown-body {
                margin: 12px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a href="index.html">Back to Validator</a>
        <button id="themeToggle" class="theme-toggle" type="button">🌙 Dark Mode</button>
        <span class="status" id="status">Loading User Guide...</span>
    </header>

    <article id="content" class="markdown-body"></article>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        function initTheme() {
            const themeToggle = document.getElementById('themeToggle');
            const stored = localStorage.getItem('readme-theme');
            const isDark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
            if (themeToggle) {
                themeToggle.textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
                themeToggle.addEventListener('click', toggleTheme);
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.dataset.theme === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            
            html.dataset.theme = newTheme;
            localStorage.setItem('readme-theme', newTheme);
            
            const toggleBtn = document.getElementById('themeToggle');
            if (toggleBtn) {
                toggleBtn.textContent = isDark ? '🌙 Dark Mode' : '☀️ Light Mode';
            }
        }

        async function loadReadme() {
            const status = document.getElementById('status');
            const content = document.getElementById('content');

            try {
                const response = await fetch('README.md', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }

                const markdown = await response.text();
                content.innerHTML = marked.parse(markdown);
                status.textContent = 'User Guide loaded';
            } catch (error) {
                content.innerHTML = '<h1>User Guide unavailable</h1><p>Could not load README.md. If you opened this file directly from disk, run a local server first (for example: <code>python3 -m http.server 8000</code>).</p>';
                status.textContent = 'Failed to load User Guide';
            }
        }

        initTheme();
        loadReadme();
    </script>
</body>
</html>
