<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bid Data Validator - User Guide</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown.min.css">
    <style>
        :root {
            color-scheme: light dark;
            --page-bg: #f6f8fa;
            --page-text: #1f2328;
            --card-bg: #ffffff;
            --border: #d0d7de;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --page-bg: #0d1117;
                --page-text: #e6edf3;
                --card-bg: #0d1117;
                --border: #30363d;
            }
        }

        body {
            margin: 0;
            background: var(--page-bg);
            color: var(--page-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 2;
            padding: 12px 16px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .topbar a {
            color: #0969da;
            text-decoration: none;
            font-weight: 600;
        }

        .topbar a:hover {
            text-decoration: underline;
        }

        .markdown-body {
            box-sizing: border-box;
            max-width: 980px;
            margin: 24px auto;
            padding: 32px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .status {
            font-size: 0.9rem;
            color: #656d76;
        }

        @media (prefers-color-scheme: dark) {
            .status {
                color: #8b949e;
            }
        }

        @media (max-width: 767px) {
            .markdown-body {
                margin: 12px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a href="index.html">Back to Validator</a>
        <span class="status" id="status">Loading README...</span>
    </header>

    <article id="content" class="markdown-body"></article>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        async function loadReadme() {
            const status = document.getElementById('status');
            const content = document.getElementById('content');

            try {
                const response = await fetch('README.md', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }

                const markdown = await response.text();
                content.innerHTML = marked.parse(markdown);
                status.textContent = 'README loaded';
            } catch (error) {
                content.innerHTML = '<h1>README unavailable</h1><p>Could not load README.md. If you opened this file directly from disk, run a local server first (for example: <code>python3 -m http.server 8000</code>).</p>';
                status.textContent = 'Failed to load README';
            }
        }

        loadReadme();
    </script>
</body>
</html>
