<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bid Data Validator - User Guide</title>
    <script>
        (function () {
            const STORAGE_KEY = 'app-theme-mode';
            const saved = localStorage.getItem(STORAGE_KEY);
            const mode = saved === 'dark' || saved === 'light' || saved === 'system' ? saved : 'system';
            const systemTheme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            const resolvedTheme = mode === 'system' ? systemTheme : mode;

            document.documentElement.dataset.themeMode = mode;
            document.documentElement.dataset.theme = resolvedTheme;
            document.documentElement.style.colorScheme = resolvedTheme;
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown.min.css">
    <link rel="stylesheet" href="readme.css">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a href="index.html">Back to Validator</a>
            <div class="topbar-controls">
                <button id="themeToggle" class="theme-toggle" type="button">Theme: 🖥️ System</button>
                <span class="status" id="status">Loading User Guide...</span>
            </div>
        </div>
    </header>

    <main class="content-wrap">
        <article id="content" class="markdown-body"></article>
    </main>

    <script src="theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="readme.js"></script>
</body>
</html>
