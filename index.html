<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bid Data Validator - Scraped JSON Gate</title>
    <script src="https://cdn.jsdelivr.net/npm/ajv@8/dist/ajv.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff; --card: #f8fafc; --text: #1e293b; --accent: #3b82f6; --danger: #ef4444; --success: #10b981;
            --border: #e2e8f0; --shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        [data-theme="dark"] {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #60a5fa; --danger: #f87171; --success: #34d399;
            --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 2rem; font-weight: 600; margin-bottom: 1rem; color: var(--accent); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .theme-toggle { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; cursor: pointer; }
        .card { background: var(--card); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); border: 1px solid var(--border); }
        label { display: block; font-weight: 500; margin-bottom: 0.5rem; }
        textarea, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: monospace; font-size: 14px; }
        textarea { height: 200px; resize: vertical; }
        select[multiple] { height: 160px; }
        .file-drop { border: 2px dashed var(--border); border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.2s; }
        .file-drop.dragover { border-color: var(--accent); background: rgba(59,130,246,0.05); }
        input[type=file] { display: none; }
        button { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.2s; margin: 4px; }
        button:hover { background: #2563eb; transform: translateY(-1px); }
        button.danger { background: var(--danger); }
        button.danger:hover { background: #dc2626; }
        button.success { background: var(--success); }
        button.success:hover { background: #059669; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin: 1rem 0; }
        .stat { background: var(--bg); padding: 1rem; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .stat.pass { border-color: var(--success); background: rgba(16,185,129,0.1); }
        .stat.fail { border-color: var(--danger); background: rgba(239,68,68,0.1); }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--bg); font-weight: 600; }
        tr:hover { background: rgba(59,130,246,0.05); }
        .progress { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin: 1rem 0; }
        .progress-bar { height: 100%; background: var(--accent); transition: width 0.3s; }
        @media (max-width: 768px) { body { padding: 1rem; } h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚫 Bid Data Validator</h1>
            <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
        </div>
        
        <div class="card">
            <label>Select Required Fields <small>(Ctrl+Click multiple, then Apply)</small></label>
            <select id="requiredFields" multiple>
                <option>ProjectCode</option><option>AgentID</option><option>LegacyAgentID</option>
                <option>Title</option><option>BidStatus</option><option>BidType</option>
                <option>BidURL</option><option>Description</option>
                <option>PublishedDate</option><option>DueDate</option><option>AwardDate</option>
                <option>Created</option><option>Modified</option><option>Refreshed</option>
                <option>AgentName</option><option>Jurisdiction</option>
            </select>
            <button onclick="updateSchema()">✅ Apply to Schema</button>
        </div>
        
        <div class="card">
            <label>JSON Schema <small>(Auto-updates from selection)</small></label>
            <textarea id="schema">{
  "type": "object",
  "properties": {
    "Export": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "ProjectCode": { "type": "string", "pattern": "^SRC\\d+$" },
          "AgentID": { "type": "string", "minLength": 1 },
          "Title": { "type": "string", "minLength": 5 },
          "BidStatus": { "type": "string", "enum": ["Active", "Awarded", "Closed", "Cancelled"] },
          "BidURL": { "type": "string", "format": "uri" },
          "PublishedDate": { "type": "string", "format": "date-time" },
          "DueDate": { "type": "string", "format": "date-time" },
          "AgentName": { "type": "string", "minLength": 1 }
        }
      }
    }
  },
  "required": ["Export"]
}</textarea>
        </div>
        
        <div class="card">
            <label>Drop Scraped JSON Files Here</label>
            <div id="fileDrop" class="file-drop" onclick="document.getElementById('jsonFile').click()">
                📁 Drag lambda-*.json files or click to browse (multiple OK)
            </div>
            <input type="file" id="jsonFile" accept=".json" multiple>
        </div>
        
        <button onclick="validateFiles()" style="width:100%; font-size:1.1rem;">🚀 Validate Batch</button>
        
        <div id="progress" class="progress" style="display:none;"><div id="progressBar" class="progress-bar"></div></div>
        <div id="results"></div>
    </div>

    <script>
        const ajv = new Ajv({ allErrors: true, verbose: true });
        
        // Theme
        function toggleTheme() {
            document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
            document.querySelector('.theme-toggle').textContent = document.body.dataset.theme === 'dark' ? '☀️ Light' : '🌙 Dark';
        }
        
        // File drag-drop
        const fileDrop = document.getElementById('fileDrop');
        const fileInput = document.getElementById('jsonFile');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(event => {
            fileDrop.addEventListener(event, e => {
                e.preventDefault();
                e.stopPropagation();
                if (event === 'dragenter' || event === 'dragover') fileDrop.classList.add('dragover');
                else fileDrop.classList.remove('dragover');
                if (event === 'drop') {
                    fileInput.files = e.dataTransfer.files;
                    fileDrop.textContent = `${e.dataTransfer.files.length} files loaded`;
                }
            });
        });
        
        // Dynamic schema update
        function updateSchema() {
            const selected = Array.from(document.getElementById('requiredFields').selectedOptions).map(o => o.value);
            if (!selected.length) return alert('Select required fields');
            let schema = JSON.parse(document.getElementById('schema').value);
            schema.properties.Export.items.required = selected;
            document.getElementById('schema').value = JSON.stringify(schema, null, 2);
            alert(`✅ Set ${selected.length} required fields`);
        }
        
        // Unwrap Export array (your schema)
        function unwrap(data) {
            if (data?.Export) return data.Export;
            if (Array.isArray(data)) return data;
            const key = Object.keys(data)[0];
            return data[key] || [];
        }
        
        async function validateFiles() {
            const progress = document.getElementById('progress');
            const progressBar = document.getElementById('progressBar');
            const results = document.getElementById('results');
            
            const schemaText = document.getElementById('schema').value;
            let schema;
            try { schema = JSON.parse(schemaText); } catch { return alert('Invalid schema'); }
            
            const files = fileInput.files;
            if (!files.length) return alert('Load JSON files');
            
            progress.style.display = 'block';
            results.innerHTML = '<p>🔄 Validating...</p>';
            
            let allGood = [], allBad = [], allErrors = [], totalRecords = 0;
            
            for (let i = 0; i < files.length; i++) {
                progressBar.style.width = `${((i + 1) / files.length) * 100}%`;
                const file = files[i];
                const jsonText = await file.text();
                let data;
                try { data = JSON.parse(jsonText); } catch { continue; }
                
                const records = unwrap(data);
                totalRecords += records.length;
                
                const validateItem = ajv.compile(schema.properties.Export.items);
                const good = [], bad = [], errors = [];
                
                records.forEach((item, idx) => {
                    if (validateItem(item)) good.push(item);
                    else {
                        bad.push(item);
                        validateItem.errors.forEach(err => {
                            errors.push({ file: file.name, index: idx, path: err.instancePath, message: err.message });
                        });
                    }
                });
                
                allGood.push(...good);
                allBad.push(...bad);
                allErrors.push(...errors);
            }
            
            progress.style.display = 'none';
            
            const passRate = totalRecords ? (allGood.length / totalRecords * 100).toFixed(1) : 0;
            const isPass = passRate >= 95;
            
            results.innerHTML = `
                <div class="stats-grid">
                    <div class="stat ${isPass ? 'pass' : 'fail'}">
                        <h3>${passRate}%</h3>
                        <p>Pass Rate</p>
                    </div>
                    <div class="stat">
                        <h3>${allGood.length}</h3>
                        <p>Good Records</p>
                    </div>
                    <div class="stat">
                        <h3>${allBad.length}</h3>
                        <p>Bad Records</p>
                    </div>
                    <div class="stat">
                        <h3>${allErrors.length}</h3>
                        <p>Errors Found</p>
                    </div>
                </div>
                
                <div class="card">
                    <h3>${isPass ? '✅ Pipeline Ready' : '❌ Gate Failed'}</h3>
                    <p>${totalRecords} total records across ${files.length} files</p>
                </div>
                
                <div class="card">
                    <h3>🔥 Top Errors</h3>
                    <table>
                        <tr><th>File</th><th>Record #</th><th>Field</th><th>Error</th></tr>
                        ${allErrors.slice(0, 50).map(e => 
                            `<tr><td>${e.file}</td><td>${e.index}</td><td>${e.path}</td><td>${e.message}</td></tr>`
                        ).join('')}
                    </table>
                </div>
                
                <div class="card">
                    <h3>⬇️ Downloads</h3>
                    <button class="success" onclick="download('good-bids.json', ${JSON.stringify(allGood)})">✅ Good Records JSON</button>
                    <button class="danger" onclick="download('bad-bids.json', ${JSON.stringify(allBad)})">❌ Bad Records JSON</button>
                    <button onclick="download('errors.csv', toCSV(allErrors))">📊 Error Report CSV</button>
                </div>
            `;
        }
        
        function download(filename, content) {
            const blob = new Blob([typeof content === 'string' ? content : JSON.stringify(content, null, 2)], 
                { type: filename.endsWith('.csv') ? 'text/csv' : 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; a.click();
            URL.revokeObjectURL(url);
        }
        
        function toCSV(errors) {
            if (!errors.length) return 'No errors';
            return 'File,Record,Field,Error\n' + errors.map(e => `"${e.file}",${e.index},"${e.path}","${e.message}"`).join('\n');
        }
    </script>
</body>
</html>
