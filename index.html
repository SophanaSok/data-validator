<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bid Data Validator - Scraped JSON Gate</title>
  <script>
    (function () {
      const STORAGE_KEY = 'app-theme-mode';
      const saved = localStorage.getItem(STORAGE_KEY);
      const mode = saved === 'dark' || saved === 'light' || saved === 'system' ? saved : 'system';
      const systemTheme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      const resolvedTheme = mode === 'system' ? systemTheme : mode;

      document.documentElement.dataset.themeMode = mode;
      document.documentElement.dataset.theme = resolvedTheme;
      document.documentElement.style.colorScheme = resolvedTheme;
    })();
  </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚫 Bid Data Validator</h1>
            <div class="header-controls">
            <a class="readme-link" href="readme.html" target="_blank" rel="noopener noreferrer">User Guide</a>
                <span class="engine-badge" aria-label="Validation engine status" data-tooltip="Validation runs in your browser only. No data is sent to a server." title="Validation runs in your browser only. No data is sent to a server." tabindex="0">Validation Engine: Local</span>
        <button id="themeToggle" class="theme-toggle" type="button">Theme: 🖥️ System</button>
            </div>
        </div>
        
        <div class="card">
            <div class="select-header">
                <label>Select Required Fields <small>(Click to select, click again to deselect, then Apply)</small></label>
                <button id="selectAllBtn" type="button" class="select-all-btn">Select All</button>
            </div>
            <select id="requiredFields" multiple>
                <option selected>AgentName</option><option selected>AgentID</option><option selected>LegacyAgentID</option><option selected>ResourceURL</option>
                <option>AwardDate</option><option value="BidDocuments">BidDocuments[]</option><option>BidStatus</option><option>BidType</option>
                <option>BidURL</option><option>Description</option>
                <option>DueDate</option><option>Jurisdiction</option><option>ProjectCode</option><option>PublishedDate</option><option>Title</option>
            </select>
            <p id="requiredSelectionCount" class="selection-count" aria-live="polite"></p>
              <label for="manualRequiredFields">Manual Required Fields <small>(comma or new line separated)</small></label>
              <textarea id="manualRequiredFields" class="manual-required-input" rows="3" placeholder="Example: ProjectCode, Title, BidStatus"></textarea>
            <button id="applySchemaBtn" type="button">✅ Apply to Schema</button>
            <p class="field-hint">Only fields selected and applied as required are validated. Unselected fields (for example BidDocuments[]) are ignored in Top Errors.</p>
        </div>
        
        <div class="card">
            <label>JSON Schema <small>(Auto-updates from selection)</small></label>
            <textarea id="schema">{
  "type": "object",
  "properties": {
    "Export": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "ProjectCode": { "type": "string", "pattern": "^SRC\\d+$" },
          "AgentID": { "type": "string", "minLength": 1 },
          "Title": { "type": "string", "minLength": 5 },
          "BidStatus": { "type": "string" },
          "BidURL": { "type": "string", "format": "uri" },
          "PublishedDate": { "type": "string", "format": "date-time" },
          "DueDate": { "type": "string", "format": "date-time" },
          "AgentName": { "type": "string", "minLength": 1 },
          "BidDocuments": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "Title": { "type": "string", "minLength": 1 },
                "URL": { "type": "string", "minLength": 1 },
                "Hash": { "type": "string", "minLength": 1 }
              },
              "required": ["Title", "URL", "Hash"]
            }
          }
        }
      }
    }
  },
  "required": ["Export"]
}</textarea>
        </div>
        
        <div class="card">
            <label>Drop Scraped JSON Files Here</label>
            <label id="fileDrop" class="file-drop" for="jsonFile" role="button" tabindex="0">
                📁 Drag .json files or click to browse (multiple OK)
            </label>
            <input type="file" id="jsonFile" class="file-input" accept=".json,application/json,text/json" multiple>
            <div id="fileList" class="file-list" aria-live="polite"></div>
        </div>
        
        <button id="validateBtn" type="button" style="width:100%; font-size:1.1rem;">🚀 Validate Batch</button>
        
        <div id="progress" class="progress" style="display:none;"><div id="progressBar" class="progress-bar"></div></div>
        <div id="results"></div>
    </div>

    <script src="theme.js"></script>
    <script src="script.js"></script>
</body>
</html>
