<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bid Data Validator - Scraped JSON Gate</title>
    <script src="https://cdn.jsdelivr.net/npm/ajv@8/dist/ajv.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚫 Bid Data Validator</h1>
          <button id="themeToggle" class="theme-toggle" type="button">🌙 Dark Mode</button>
        </div>
        
        <div class="card">
            <label>Select Required Fields <small>(Ctrl+Click multiple, then Apply)</small></label>
            <select id="requiredFields" multiple>
                <option>ProjectCode</option><option>AgentID</option><option>LegacyAgentID</option>
                <option>Title</option><option>BidStatus</option><option>BidType</option>
                <option>BidURL</option><option>Description</option>
                <option>PublishedDate</option><option>DueDate</option><option>AwardDate</option>
                <option>Created</option><option>Modified</option><option>Refreshed</option>
                <option>AgentName</option><option>Jurisdiction</option>
            </select>
              <label for="manualRequiredFields">Manual Required Fields <small>(comma or new line separated)</small></label>
              <textarea id="manualRequiredFields" class="manual-required-input" rows="3" placeholder="Example: ExternalID, RegionCode"></textarea>
            <button id="applySchemaBtn" type="button">✅ Apply to Schema</button>
        </div>
        
        <div class="card">
            <label>JSON Schema <small>(Auto-updates from selection)</small></label>
            <textarea id="schema">{
  "type": "object",
  "properties": {
    "Export": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "ProjectCode": { "type": "string", "pattern": "^SRC\\d+$" },
          "AgentID": { "type": "string", "minLength": 1 },
          "Title": { "type": "string", "minLength": 5 },
          "BidStatus": { "type": "string", "enum": ["Active", "Awarded", "Closed", "Cancelled"] },
          "BidURL": { "type": "string", "format": "uri" },
          "PublishedDate": { "type": "string", "format": "date-time" },
          "DueDate": { "type": "string", "format": "date-time" },
          "AgentName": { "type": "string", "minLength": 1 }
        }
      }
    }
  },
  "required": ["Export"]
}</textarea>
        </div>
        
        <div class="card">
            <label>Drop Scraped JSON Files Here</label>
            <label id="fileDrop" class="file-drop" for="jsonFile" role="button" tabindex="0">
                📁 Drag lambda-*.json files or click to browse (multiple OK)
            </label>
            <input type="file" id="jsonFile" class="file-input" accept=".json,application/json,text/json" multiple>
            <div id="fileList" class="file-list" aria-live="polite"></div>
        </div>
        
        <button id="validateBtn" type="button" style="width:100%; font-size:1.1rem;">🚀 Validate Batch</button>
        
        <div id="progress" class="progress" style="display:none;"><div id="progressBar" class="progress-bar"></div></div>
        <div id="results"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
